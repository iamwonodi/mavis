name: Mavis — Build, Version & Push to AWS ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:     ${{ vars.AWS_REGION }}
  ECR_REGISTRY:   ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  IMAGE_NAME:     mavis

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Compute version
  # ─────────────────────────────────────────────────────────────────────────────
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.semver.outputs.version }}
      short_sha:  ${{ steps.semver.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: semver
        run: |
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n 1)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          VERSION_CORE=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION_CORE" | cut -d. -f1)
          MINOR=$(echo "$VERSION_CORE" | cut -d. -f2)
          PATCH=$(echo "$VERSION_CORE" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${NEW_VERSION}"     >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}"     >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION ($SHORT_SHA)"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build and push to ECR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: version
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    permissions:
      id-token: write
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_IAM_ROLE_ARN }}
          role-session-name: GitHubActions-Mavis-${{ needs.version.outputs.short_sha }}
          aws-region:        ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check version tag does not already exist
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          EXISTS=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --image-ids imageTag="$VERSION" \
            --query 'imageDetails[0].imageTags' \
            --output text 2>/dev/null || echo "NOTFOUND")
          if [ "$EXISTS" != "NOTFOUND" ] && [ "$EXISTS" != "None" ]; then
            echo "ERROR: Tag $VERSION already exists. Aborting."
            exit 1
          fi
          echo "Tag $VERSION is clean. Proceeding."

      - name: Build, tag and push Docker image
        id: build
        env:
          VERSION:   ${{ needs.version.outputs.version }}
          SHORT_SHA: ${{ needs.version.outputs.short_sha }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=registry,ref=${FULL_IMAGE}:buildcache \
            --cache-to   type=registry,ref=${FULL_IMAGE}:buildcache,mode=max \
            --tag "${FULL_IMAGE}:${VERSION}" \
            --tag "${FULL_IMAGE}:${SHORT_SHA}" \
            --tag "${FULL_IMAGE}:latest" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.revision=${SHORT_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            --push \
            .
          echo "image_uri=${FULL_IMAGE}:${VERSION}" >> $GITHUB_OUTPUT

      - name: Push git version tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete the tag locally and remotely if it exists, then re-create it
          # This makes the step safe to re-run without failing
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          git tag "$VERSION" -m "Release $VERSION [ci skip]"
          git push origin "$VERSION"

      # # ── ECR Cleanup: remove untagged images after every push ────────────────
      # # This keeps ECR clean by deleting the unnamed 'Image' entries that
      # # accumulate as old manifests whenever tags are updated.
      # - name: Clean up untagged ECR images
      #   run: |
      #     echo "Fetching untagged image digests..."
      #     UNTAGGED=$(aws ecr list-images \
      #       --repository-name "$ECR_REPOSITORY" \
      #       --region "$AWS_REGION" \
      #       --filter tagStatus=UNTAGGED \
      #       --query 'imageIds[*]' \
      #       --output json)

      #     COUNT=$(echo "$UNTAGGED" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")

      #     if [ "$COUNT" -gt "0" ]; then
      #       echo "Deleting $COUNT untagged image(s)..."
      #       aws ecr batch-delete-image \
      #         --repository-name "$ECR_REPOSITORY" \
      #         --region "$AWS_REGION" \
      #         --image-ids "$UNTAGGED" \
      #         --output text
      #       echo "Untagged images deleted."
      #     else
      #       echo "No untagged images to clean up."
      #     fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to TensorDock via tmux
  # Fires the update script inside a tmux session so it survives independently
  # of the SSH connection. The pipeline completes in seconds.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-to-tensordock:
    name: Deploy to TensorDock Instance
    runs-on: ubuntu-latest
    needs: [version, build-and-push]
    if: success()

    steps:
      - name: SSH into TensorDock and trigger update via tmux
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.TENSORDOCK_HOST }}
          username: ${{ secrets.TENSORDOCK_USER }}
          key:      ${{ secrets.TENSORDOCK_SSH_KEY }}
          port:     ${{ secrets.TENSORDOCK_SSH_PORT }}
          script: |
            echo "=== Mavis Deployment: ${{ needs.version.outputs.version }} ==="

            # Kill any previous deployment tmux session if it is still running
            tmux kill-session -t mavis-deploy 2>/dev/null || true

            # Build the command as a variable to avoid quoting issues
            CMD="/opt/mavis/update.sh"
            CMD="$CMD ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}"
            CMD="$CMD ${{ needs.version.outputs.version }}"
            CMD="$CMD ${{ env.AWS_REGION }}"

            # Start a detached tmux session that runs the update script
            # The session persists on the instance after SSH closes.
            tmux new-session -d -s mavis-deploy "bash $CMD; echo EXIT_CODE=\$? >> /var/log/mavis-deploy.log"

            echo "Deployment running in tmux session 'mavis-deploy' on the instance."
            echo "To monitor: ssh tensordock then: tmux attach -t mavis-deploy"
            echo "Or tail the log: tail -f /var/log/mavis-deploy.log"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Deployment summary
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [version, build-and-push, deploy-to-tensordock]
    if: always()

    steps:
      - name: Write deployment summary
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          IMAGE="${{ needs.build-and-push.outputs.image_uri }}"
          STATUS="${{ needs.deploy-to-tensordock.result }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🎙️ Mavis Deployment Report

          | Field         | Value                              |
          |---------------|------------------------------------|
          | Version       | \`${VERSION}\`                     |
          | Image URI     | \`${IMAGE}\`                       |
          | Deploy Status | ${STATUS}                          |
          | Triggered by  | @${{ github.actor }}               |
          | Commit        | \`${{ github.sha }}\`              |
          | Timestamp     | $(date -u '+%Y-%m-%d %H:%M UTC')   |

          ### To monitor deployment progress on the instance:
          \`\`\`
          ssh tensordock
          tmux attach -t mavis-deploy
          \`\`\`
          Or tail the log:
          \`\`\`
          tail -f /var/log/mavis-deploy.log
          \`\`\`
          EOF
